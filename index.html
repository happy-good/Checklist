<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full-View Switch Checklist</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- VIEW 1: INPUT (Visible by default) -->
    <div id="input-view-container">
        <div class="container">
            <header>
                <h1>체크리스트</h1>
                <p id="current-date"></p> <!-- Date will be injected here -->
            </header>
            <div id="checklist-container">
                <!-- 7 input rows -->
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 1..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 2..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 3..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 4..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 5..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 6..." autocomplete="off"></div>
                <div class="input-row"><input type="text" class="user-input" placeholder="Enter task 7..." autocomplete="off"></div>
            </div>
        </div>
    </div>

    <!-- VIEW 2: CONFIRMATION (Hidden by default) -->
    <div id="confirmation-view-container" class="hidden">
        <div class="container">
            <header>
                <h1>확인</h1>
                <p id="confirmation-date"></p> <!-- Date will be injected here -->
            </header>
            <div id="confirmation-list">
                <!-- Dynamically generated confirmation buttons will go here -->
            </div>
            <div class="page-controls">
                <button id="back-to-edit-btn">수정</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
